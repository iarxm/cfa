set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '5' #mins
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g base-index 1
set -g base-index 1
set -g pane-border-style fg="#000000"
set -g pane-active-border-style fg="#909999"
set -g pane-active-border-style fg="#909999"
set -g status-bg "black"
set -g status-fg "yellow"
set -g status-left "#S "
set -g status-right ""
set-option -g default-terminal screen-256color
    # TASK can this be made into a command?
set-option -g prefix C-Space # binding prefix
unbind C-Space
bind C-Space send-prefix
bind-key v split-window -h
bind-key s split-window -v
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R
bind-key Space last-window
bind-key -r C-k resize-pane -U 2
bind-key -r C-j resize-pane -D 2
bind-key -r C-h resize-pane -L 2
bind-key -r C-l resize-pane -R 2
bind-key S source-file ~/.config/tmux/tmux.conf \; display "Reloaded config" 
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins/"
# (keep at bott)
if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm \
        $TMUX_PLUGIN_MANAGER_PATH/tpm \
        && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins'"
run -b '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'
